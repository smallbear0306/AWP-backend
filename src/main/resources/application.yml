server:
  port: 8080

spring:
  application:
    name: awp-backend
  # 本地真实密码放在 application-local.yml（已 gitignore，不入库）
  config:
    import: optional:application-local.yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/awp?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  # 上传截图大小上限（原图，压缩在后端做）
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 20MB

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.awp.entity
  configuration:
    # 下划线字段自动映射为驼峰属性（record_date -> recordDate）
    map-underscore-to-camel-case: true

# 自定义配置
awp:
  jwt:
    # 生产环境请改为更长的随机密钥，并通过环境变量注入
    secret: awp-default-jwt-secret-key-please-change-in-production-1234567890
    # token 有效期（毫秒），默认 7 天
    expire-millis: 604800000
  # 图像识别（火山/腾讯 TokenHub youtu-vita，OpenAI 兼容）
  # 真实 api-key 放 application-local.yml，不入库
  vita:
    # 火山方舟 doubao（OpenAI 兼容 chat/completions）
    base-url: https://ark.cn-beijing.volces.com/api/v3/chat/completions
    model: doubao-seed-2-0-lite-260428
    api-key: ${VITA_API_KEY:}
    # 关闭深度思考(豆包支持)，识别提速约 4-5 倍；换不支持该参数的模型时改为 false
    disable-thinking: true
    # 压缩参数：长边像素 / JPEG 质量(0-1)
    max-edge: 1280
    quality: 0.8
  # 向量检索（阿里云百炼 DashScope，OpenAI 兼容 embeddings）；key 放 application-local.yml
  embedding:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings
    model: text-embedding-v3
    api-key: ${EMBEDDING_API_KEY:}
    # 检索召回的知识卡片数
    top-k: 2

logging:
  level:
    com.awp.mapper: debug
